<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timer settings</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <p class="brand-copy">
          Add a distracting site, pick a max time, and the timer will appear on matching pages.
        </p>
      </header>

      <form class="rule-form" id="rule-form" novalidate>
        <label class="field">
          <span>Website</span>
          <input
            id="website-input"
            name="website"
            type="text"
            inputmode="url"
            autocomplete="off"
            placeholder="instagram.com"
            required
          >
        </label>

        <label class="field limit-field">
          <span>Minutes</span>
          <input
            id="limit-input"
            name="limit"
            type="number"
            min="0.1"
            max="1440"
            step="0.5"
            value="5"
            required
          >
        </label>

        <button class="primary-button" type="submit">
          <span class="button-icon" aria-hidden="true">+</span>
          <span>Add pump</span>
        </button>
      </form>

      <p class="form-message" id="form-message" role="status" aria-live="polite" hidden></p>

      <section class="sound-panel" aria-labelledby="sound-heading">
        <div class="section-heading">
          <h1 id="sound-heading">Launch sound</h1>
          <span class="sound-chip">Mountains</span>
        </div>

        <div class="sound-row">
          <div class="sound-copy">
            <strong>Play on pump launch</strong>
            <span id="sound-file-label">Using packaged default audio.</span>
          </div>
          <label class="switch" title="Enable launch sound">
            <input id="sound-enabled-input" type="checkbox" aria-label="Enable launch sound">
            <span class="switch-track"></span>
          </label>
        </div>

        <label class="volume-field" for="sound-volume-input">
          <span>
            <span>Volume</span>
            <output id="sound-volume-label" for="sound-volume-input">35%</output>
          </span>
          <input id="sound-volume-input" type="range" min="0" max="100" step="1" value="35">
        </label>

        <div class="sound-actions">
          <input id="sound-file-input" type="file" accept="audio/*" hidden>
          <button class="secondary-button" id="sound-import-button" type="button">
            <span class="button-icon" aria-hidden="true">+</span>
            <span>Import song</span>
          </button>
          <button class="secondary-button" id="sound-test-button" type="button">
            <span class="button-icon" aria-hidden="true">&gt;</span>
            <span>Test</span>
          </button>
          <button class="ghost-button" id="sound-clear-button" type="button">
            <span>Clear</span>
          </button>
        </div>
      </section>

      <section class="visual-panel" aria-labelledby="visual-heading">
        <div class="section-heading">
          <h1 id="visual-heading">Bubble background</h1>
          <span class="sound-chip">GIF</span>
        </div>

        <div class="visual-preview" id="gif-preview" aria-hidden="true">
          <span id="gif-preview-label">No GIF set.</span>
        </div>

        <label class="field visual-url-field">
          <span>GIF URL</span>
          <input
            id="gif-url-input"
            type="url"
            inputmode="url"
            autocomplete="off"
            placeholder="https://media4.giphy.com/.../giphy.gif"
          >
        </label>

        <div class="visual-actions">
          <button class="secondary-button" id="gif-save-button" type="button">
            <span class="button-icon" aria-hidden="true">+</span>
            <span>Save GIF</span>
          </button>
          <button class="ghost-button" id="gif-clear-button" type="button">
            <span>Clear</span>
          </button>
        </div>
      </section>

      <section class="rules-section" aria-labelledby="rules-heading">
        <div class="section-heading">
          <h1 id="rules-heading">Saved pumps</h1>
          <span class="rule-count" id="rule-count">0</span>
        </div>

        <div class="rules-list" id="rules-list"></div>
      </section>
    </main>

    <script src="../shared/url.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
